name: Terraform AD Lab Deployment

on:
  workflow_dispatch:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  security-scan:
    name: Terraform Security Scan
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Run Checkov Scan
        uses: bridgecrewio/checkov-action@master
        with:
          directory: .
          framework: terraform
          soft_fail: true

      - name: Run Trivy IaC Scan
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: config
          scan-ref: .
          format: table
          exit-code: 0

  deploy:
    name: Terraform Deploy
    runs-on: ubuntu-latest
    needs: security-scan

    env:
      ARM_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
      ARM_CLIENT_SECRET: ${{ secrets.AZURE_CLIENT_SECRET }}
      ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
      ARM_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}

      TF_VAR_my_public_ip: ${{ secrets.MY_PUBLIC_IP }}
      TF_VAR_local_admin_username: ${{ secrets.LOCAL_ADMIN_USERNAME }}
      TF_VAR_local_admin_password: ${{ secrets.LOCAL_ADMIN_PASSWORD }}
      TF_VAR_dsrm_password: ${{ secrets.DSRM_PASSWORD }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform Format Check
        run: terraform fmt -check -recursive

      - name: Terraform Init
        run: terraform init

      - name: Terraform Validate
        run: terraform validate

      - name: Terraform Plan
        run: terraform plan

      - name: Terraform Apply
        if: github.event_name == 'workflow_dispatch' || github.ref == 'refs/heads/main'
        run: terraform apply -auto-approve

      - name: Send Success Email
        if: success()
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          secure: true
          username: ${{ secrets.EMAIL_USERNAME }}
          password: ${{ secrets.EMAIL_PASSWORD }}
          subject: "SUCCESS: Azure AD Terraform Lab Deployment Complete"
          to: ${{ secrets.ALERT_EMAIL }}
          from: GitHub Actions <${{ secrets.EMAIL_USERNAME }}>
          body: |
            Terraform deployment completed successfully.

            Your automated Active Directory lab should now be ready.

            Validation steps:
            1. RDP into the client VM.
            2. Log in using LAB\steven.lucas.
            3. Run gpupdate /force.
            4. Run gpresult /r.
            5. Confirm the IT Security Policy GPO is applied.

      - name: Send Failure Email
        if: failure()
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          secure: true
          username: ${{ secrets.EMAIL_USERNAME }}
          password: ${{ secrets.EMAIL_PASSWORD }}
          subject: "FAILED: Azure AD Terraform Lab Deployment"
          to: ${{ secrets.ALERT_EMAIL }}
          from: GitHub Actions <${{ secrets.EMAIL_USERNAME }}>
          body: |
            Terraform deployment failed.

            Review the GitHub Actions logs.

            Common failure points:
            - Azure authentication issue
            - Terraform syntax or provider issue
            - VM extension failed
            - Domain controller promotion failed
            - Post-reboot AD configuration failed
            - Client VM failed to join lab.local